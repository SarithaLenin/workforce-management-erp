{% extends 'base.html' %}

{% block page_title %}
Reset Password
{% endblock %}

{% block page_subtitle %}
Admin password reset
{% endblock %}

{% block content %}

<div class="card shadow-sm border-0">
    <div class="card-body">

        <h5 class="mb-3">
            Reset password for {{ user_obj.username }}
        </h5>

        <form method="POST">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn btn-success">
                Reset Password
            </button>

            <a href="{% url 'user_list' %}" class="btn btn-secondary">
                Cancel
            </a>

        </form>

    </div>
</div>

{% endblock %}
