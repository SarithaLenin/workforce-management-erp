{% extends 'base.html' %}

{% block page_title %}
Edit Profile
{% endblock %}

{% block page_subtitle %}
Update your personal details
{% endblock %}

{% block content %}

<div class="card shadow-sm border-0">
    <div class="card-body">

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">First Name</label>
                {{ form.first_name }}
            </div>

            <div class="mb-3">
                <label class="form-label">Last Name</label>
                {{ form.last_name }}
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                {{ form.email }}
            </div>

            <button type="submit" class="btn btn-success">
                Save Changes
            </button>

            <a href="{% url 'profile' %}" class="btn btn-secondary">
                Cancel
            </a>

        </form>

    </div>
</div>

{% endblock %}
