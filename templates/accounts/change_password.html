{% extends 'base.html' %}

{% block page_title %}
Change Password
{% endblock %}

{% block page_subtitle %}
Update your account password
{% endblock %}

{% block content %}

<div class="card shadow-sm border-0">
    <div class="card-body">

        <form method="POST">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn btn-success">
                Change Password
            </button>

            <a href="{% url 'profile' %}" class="btn btn-secondary">
                Cancel
            </a>

        </form>

    </div>
</div>

{% endblock %}
