{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1"
    >

    <title>Login | Workforce Management ERP</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
        rel="stylesheet"
    >

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background:
                linear-gradient(
                    90deg,
                    rgba(15, 23, 42, 0.12),
                    rgba(15, 23, 42, 0.48)
                ),
                url("{% static 'images/login-background.png' %}")
                center / cover no-repeat fixed;
        }

        .login-layout {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 40px 7%;
        }

        .login-card {
            width: 100%;
            max-width: 430px;
            padding: 38px;
            border: 1px solid rgba(255, 255, 255, 0.55);
            border-radius: 22px;
            background: rgba(255, 255, 255, 0.94);
            box-shadow: 0 25px 60px rgba(15, 23, 42, 0.35);
            backdrop-filter: blur(12px);
        }

        .brand-icon {
            width: 68px;
            height: 68px;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
            background: #1e293b;
            color: white;
            font-size: 31px;
        }

        .login-title {
            margin-bottom: 4px;
            text-align: center;
            color: #0f172a;
            font-size: 28px;
            font-weight: 700;
        }

        .login-subtitle {
            margin-bottom: 28px;
            text-align: center;
            color: #64748b;
        }

        .form-label {
            color: #334155;
            font-weight: 600;
        }

        .input-group-text {
            background: white;
            color: #64748b;
        }

        .form-control {
            min-height: 48px;
        }

        .login-button {
            min-height: 48px;
            border: 0;
            background: #2563eb;
            font-weight: 600;
        }

        .login-button:hover {
            background: #1d4ed8;
        }

        .module-text {
            margin-top: 24px;
            text-align: center;
            color: #64748b;
            font-size: 13px;
        }

        @media (max-width: 768px) {
            body {
                background-position: 35% center;
            }

            .login-layout {
                justify-content: center;
                padding: 20px;
                background: rgba(15, 23, 42, 0.42);
            }

            .login-card {
                max-width: 400px;
                padding: 28px 22px;
            }

            .login-title {
                font-size: 24px;
            }
        }
    </style>
</head>

<body>

<main class="login-layout">

    <section class="login-card">

        <div class="brand-icon">
            <i class="bi bi-people-fill"></i>
        </div>

        <h1 class="login-title">
            Workforce Management ERP
        </h1>

        <p class="login-subtitle">
            Sign in to manage your workforce operations
        </p>

        {% if messages %}
            {% for message in messages %}
                <div
                    class="alert alert-{{ message.tags }}"
                    role="alert"
                >
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label for="username" class="form-label">
                    Username
                </label>

                <div class="input-group">
                    <span class="input-group-text">
                        <i class="bi bi-person"></i>
                    </span>

                    <input
                        id="username"
                        type="text"
                        name="username"
                        class="form-control"
                        placeholder="Enter your username"
                        autocomplete="username"
                        autofocus
                        required
                    >
                </div>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label">
                    Password
                </label>

                <div class="input-group">
                    <span class="input-group-text">
                        <i class="bi bi-lock"></i>
                    </span>

                    <input
                        id="password"
                        type="password"
                        name="password"
                        class="form-control"
                        placeholder="Enter your password"
                        autocomplete="current-password"
                        required
                    >

                    <button
                        type="button"
                        class="btn btn-outline-secondary"
                        onclick="togglePassword()"
                        aria-label="Show password"
                    >
                        <i
                            id="passwordIcon"
                            class="bi bi-eye"
                        ></i>
                    </button>
                </div>
            </div>

            <button
                type="submit"
                class="btn btn-primary login-button w-100"
            >
                <i class="bi bi-box-arrow-in-right me-1"></i>
                Sign In
            </button>
        </form>

        <div class="module-text">
            Manpower · Attendance · Billing · Payroll
        </div>

    </section>

</main>

<script>
    function togglePassword() {
        const password = document.getElementById("password");
        const icon = document.getElementById("passwordIcon");

        if (password.type === "password") {
            password.type = "text";
            icon.className = "bi bi-eye-slash";
        } else {
            password.type = "password";
            icon.className = "bi bi-eye";
        }
    }
</script>

</body>
</html>
